{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TalentTrack</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">TT</div>
      <div class="logo-text">TalentTrack</div>
    </div>

    <h2>Welcome back</h2>
    <p class="auth-subtitle">Sign in to your recruitment dashboard</p>

    {% if messages %}
    <ul class="messages-list">
      {% for msg in messages %}
      <li class="{{ msg.tags }}">{{ msg }}</li>
      {% endfor %}
    </ul>
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label>Email address</label>
        <input type="email" name="email" placeholder="you@company.com" required autofocus>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-primary">Sign in</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{% url 'signup' %}">Create one</a>
    </div>

  </div>
</div>

</body>
</html>
